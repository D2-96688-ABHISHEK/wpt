<!DOCTYPE html>
<html>

<head>
  <title>Student Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body class="bg-light">

  <div class="container mt-5">
    <div class="card shadow p-4">
      <h3 class="text-center mb-3">Student Form</h3>

      <div class="mb-3">
        <input type="text" id="name" class="form-control" placeholder="Enter Name">
      </div>

      <div class="mb-3">
        <input type="text" id="course" class="form-control" placeholder="Enter Course">
      </div>

      <button id="addBtn" class="btn btn-success w-100">Add Student</button>

      <table class="table table-bordered table-striped mt-4 text-center">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Course</th>
          </tr>
        </thead>
        <tbody id="studentTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    $(document).ready(function () {

      $("#addBtn").click(function () {

        var name = $("#name").val();
        var course = $("#course").val();

        if (name === "" || course === "") {
          alert("Please enter all fields");
          return;
        }

        var row = "<tr><td>" + name + "</td><td>" + course + "</td></tr>";

        $("#studentTable").append(row);

        $("#name").val("");
        $("#course").val("");
      });

    });
  </script>

</body>

</html>
