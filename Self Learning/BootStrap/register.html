<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <style>
    body {
      background-color: rgb(226, 226, 239);
    }
  </style>

</head>

<body>

  <div class="container d-flex flex-column justify-content-center align-items-center vh-100 d-grid">
    <h1 class="text-center mb-5"><i>Welcome to our PG Booking System</i></h1>
    <div class="card p-4 shadow" style="width: 450px;">

      <h3 class="text-center mb-3">Register</h3>
      <form>
        <!-- ______________________________________________________________________________ -->
        <div>
          <label for="name">Full Name</label>
          <input type="text" class="form-control" id="name">
        </div>
        <!-- ____________________________________________________________________________ -->
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Email address</label>
          <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
          <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
        </div>
        <!-- ___________________________________________________________________________________________ -->
        <div>
          <label for="exampleInputMobileNumber" class="form-label">Mobile Number</label>
          <input type="tel" class="form-control" id="exampleInputMobileNumber">
        </div>
        <!-- ___________________________________________________________________________________________ -->
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Password</label>
          <input type="password" class="form-control" id="exampleInputPassword1">
        </div>
        <!-- _______________________________________________________________________________________________ -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword">
        </div>
        <!-- <small id="errorMsg" class="text-danger"></small> -->
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1">
          <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
        <p class="text-center mt-3">
          Already have an account?
          <a href="./Bootstrap.html">Login</a>
        </p>
        <!-- _____________________________________________________________ -->

        <!-- ______________________________________________________________ -->
      </form>
    </div>

  </div>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/bootstrap.min.js"></script>

</body>

</html>
