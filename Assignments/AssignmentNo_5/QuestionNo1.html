<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    #container {
      border: 1px solid black;
      margin-right: 800px;
      margin-top: 2%;
    }

    #innerContainer {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: row;
    }

    h4 {
      margin-left: 15%;
    }

    ul {
      margin-left: 16%;
    }
  </style>
</head>

<body>

  <div id="container">
    <h4>Enter Employees Name</h3>
      <div id=innerContainer>
        <div>
          <input type="text" placeholder="Enter Employee Name" id="name">
        </div>
        <div>
          <Button onclick="addName()">Add Name</Button>
        </div>
        <div>
          <button onclick="sort()"> Sort & Display</button>
        </div>
      </div>
      <div>
        <h4>Sorted Employees Name</h3>
          <section id="section">
            <ul style="margin-left: 10%;" id="list">

            </ul>
          </section>
      </div>
  </div>
  <script>
    let arr = [];
    let index = 0;
    function addName() {
      const name = document.getElementById('name');
      if (arr.length < 6) {
        arr.push(name.value);
        name.value = ""
      }
      else {
        alert("You can entered only six name");
      }
    }

    function sort() {
      arr.sort();

      displayName();

    }
    function displayName() {
      const list = document.getElementById('list')

      for (e of arr) {

        list.innerHTML += `<li>${e}</li>`;

      }
    }
  </script>
</body>

</html>
