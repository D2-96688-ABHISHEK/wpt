<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <script>
    function getNumber(msg) {
      let num;

      while (true) {
        let input = prompt(msg);

        if (input > 0 && input !== null) {
          num = Number(input);
          return num;
        }
        alert("Plaese Enter a Valid Positive Integer");
      }
    }

    let num1 = getNumber("Enter First positve integer");
    let num2 = getNumber("Enter Second positve integer");
    let num3 = getNumber("Enter Third positve integer");

    if (num1 > num2 && num1 > num3) {
      alert(`${num1} is greater`);
    }
    else if (num2 > num1 && num2 > num3) {
      alert(`${num2} is greater`);
    }
    else {
      alert(`${num3} is greater`);
    }
  </script>
</body>

</html>
